apiVersion: v1 
metadata: 
     name: pod-ci
     app: podci
kind:  Pod
spec: 
     containers:
      - name: nginx-container 
        image: nginx
        ports:
          - containerPort: 80
---

apiVersion: v1
metadata:
  name: ci-service
kind: Service
spec:
    selector: 
      app:podci
     ports:
      - protocol: TCP
        ports: 80
        type: ClusterIP
        targetPort:80


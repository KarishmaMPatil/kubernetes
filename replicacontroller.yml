piVersion: v1
kind: ReplicationController
metadata:
     name: rc
     labels: rcapp
spec:
replicas: 3
   template:
     metadata:
       name: rs-pod
       labels: 
         app: podrc
    spec:
      - name: nginx-container
        image: nginx
        ports:
          -containerPort: 80
    selector:
       matchLabels: 
          app: podrc



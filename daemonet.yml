apiVersion: apps/v1
kind: DaemonSet
metadata: 
   name: daemonset
   labels:
      app: damonset
spec:
    template:
      metadata:
       name: cwagent-pod
       labels: 
         app: daemonset
    spec:
       containers:
        - name: cwagent-container 
          image: amazon/cloudwatch-agent
          ports:
            containerPort: 80
    selector:
       matchLabels:
         app: daemonset             
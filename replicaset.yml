apiVersion: apps/v1  
kind: ReplicaSet
metadata:
   name: rs
   labels: 
      app: myapp
spec: 
  replicas: 4
  template:
    metadata: 
     name: np-pod 
     labels:
         app: podrc  #tags     
    spec: 
        containers:
          - name: nginx-container 
            image: nginx
            ports:
selector: 
   matchLabels: 
     app: podrc
